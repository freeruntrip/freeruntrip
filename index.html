<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Running App</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="map"></div>

  <div id="controls">
    <button id="startBtn">러닝 시작</button>
    <button id="pauseBtn">일시정지</button>
    <button id="stopBtn">러닝 종료</button>

    <div id="timer">00:00</div>
    <div id="distance">0.00 km</div>
    <div id="pace">Pace: --'--"</div>
  </div>

<div id="records">
  <h2>저장된 러닝 기록</h2>
  <div id="recordsList"></div>
</div>
<div id="recordDetail" class="hidden">
  <button id="backToRecordsBtn">← 기록 목록으로</button>

  <h2 id="detailDate">러닝 기록</h2>
  <div id="detailTimeRange"></div>

  <div id="detailStats">
    <div>
      <span>거리</span>
      <strong id="detailDistance">0.00 km</strong>
    </div>

    <div>
      <span>시간</span>
      <strong id="detailDuration">00:00</strong>
    </div>

    <div>
      <span>평균 Pace</span>
      <strong id="detailNumericPace">--'--"</strong>
    </div>
  </div>

  <div id="detailMap"></div>
</div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>

</body>
</html>
